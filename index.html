<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LGBTcoin | Premium Black Exchange</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #050505;
            --card: #111111;
            --accent: #FFD700;
            --text: #ffffff;
            --dim: #666666;
            --green: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* AUTH LAYER */
        #auth-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px;
        }
        .logo-glow {
            font-size: 40px; font-weight: 700; margin-bottom: 40px;
            background: linear-gradient(to right, #ff0000, #ffee00, #004cff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        .auth-input {
            width: 100%; max-width: 350px; background: #151515; border: 1px solid #222;
            padding: 20px; border-radius: 15px; color: #fff; margin-bottom: 15px; outline: none;
        }
        .auth-btn {
            width: 100%; max-width: 350px; background: #fff; color: #000;
            padding: 20px; border-radius: 15px; font-weight: 700; border: none; cursor: pointer;
        }

        /* MAIN UI */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        .scroll-view { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .user-pill { background: #111; padding: 8px 15px; border-radius: 50px; border: 1px solid #222; font-size: 14px; }

        /* CRYPTO CARD */
        .crypto-card {
            background: linear-gradient(145deg, #111, #000); padding: 35px 25px;
            border-radius: 30px; border: 1px solid #222; margin-bottom: 25px;
            position: relative; overflow: hidden;
        }
        .crypto-card::after {
            content: ''; position: absolute; top: -50%; right: -50%; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,215,0,0.05) 0%, transparent 70%);
        }
        .crypto-card small { color: var(--dim); text-transform: uppercase; letter-spacing: 2px; font-size: 11px; }
        .crypto-card h1 { font-size: 48px; margin: 10px 0; font-weight: 700; }
        .crypto-card .fiat-val { color: var(--green); font-size: 18px; font-weight: 500; }

        /* MARKET STATS */
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .m-item { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #1a1a1a; }
        .m-item label { display: block; color: var(--dim); font-size: 11px; margin-bottom: 5px; }
        .m-item b { font-size: 18px; }

        /* MINING BOX */
        .miner-box {
            background: #000; border: 2px solid #222; padding: 30px; border-radius: 25px;
            text-align: center; transition: 0.3s;
        }
        .miner-box.active { border-color: var(--accent); box-shadow: 0 0 20px rgba(255,215,0,0.1); }
        .btn-action {
            width: 100%; padding: 22px; border-radius: 18px; border: none;
            background: var(--accent); color: #000; font-weight: 700; font-size: 16px; cursor: pointer;
        }
        .btn-action:disabled { background: #222; color: #555; }

        /* NAV BAR */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 85px;
            background: rgba(5,5,5,0.95); backdrop-filter: blur(10px);
            border-top: 1px solid #1a1a1a; display: flex; justify-content: space-around; align-items: center;
        }
        .nav-link { color: #444; display: flex; flex-direction: column; align-items: center; text-decoration: none; font-size: 10px; cursor: pointer; }
        .nav-link.active { color: #fff; }
        .nav-link i { font-size: 22px; margin-bottom: 5px; }

        .page { display: none; }
        .page.active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* CHART CUSTOM */
        .chart-container { background: #0a0a0a; padding: 15px; border-radius: 25px; border: 1px solid #111; }
    </style>
</head>
<body>

    <section id="auth-screen">
        <div class="logo-glow">LGBTcoin</div>
        <input type="text" id="a-name" class="auth-input" placeholder="Display Name">
        <input type="tel" id="a-phone" class="auth-input" placeholder="Phone Number">
        <input type="password" id="a-pass" class="auth-input" placeholder="Password">
        <button class="auth-btn" onclick="handleAuth()">Enter Terminal</button>
    </section>

    <main id="main-app">
        <div class="scroll-view">
            
            <div id="p-home" class="page active">
                <div class="top-bar">
                    <div class="user-pill"><i class="fas fa-user-circle"></i> <span id="u-name">Miner</span></div>
                    <div style="color: var(--green); font-size: 12px;"><i class="fas fa-circle"></i> LIVE</div>
                </div>

                <div class="crypto-card">
                    <small>Vault Balance</small>
                    <h1 id="u-bal">0.0000</h1>
                    <div class="fiat-val">≈ <span id="u-euro">0.00</span> EUR</div>
                </div>

                <div class="market-grid">
                    <div class="m-item"><label>Current Price</label><b id="m-price">€0.00</b></div>
                    <div class="m-item"><label>Mining Speed</label><b id="u-speed">3.0 GH/s</b></div>
                </div>

                <div class="miner-box" id="m-box">
                    <button class="btn-action" id="m-btn" onclick="startCycle()">START CLOUD MINING</button>
                    <p id="m-timer" style="margin-top:15px; color:var(--dim); font-size:12px;"></p>
                </div>
            </div>

            <div id="p-market" class="page">
                <h2 style="margin-bottom:20px;">Exchange Data</h2>
                <div class="chart-container">
                    <canvas id="mainChart"></canvas>
                </div>
                <div class="m-item" style="margin-top:20px; display:flex; justify-content:space-between;">
                    <span>Market Trend</span>
                    <span id="m-status" style="color:var(--green)">WAITING DATA...</span>
                </div>
            </div>

            <div id="p-wallet" class="page">
                <h2 style="margin-bottom:20px;">Asset Transfer</h2>
                <div class="m-item" style="margin-bottom:15px;">
                    <input type="text" id="t-phone" class="auth-input" placeholder="Receiver Phone" style="margin-bottom:10px; background:#000;">
                    <input type="number" id="t-amt" class="auth-input" placeholder="Amount (LGBT)" style="background:#000;">
                    <button class="btn-action" style="margin-top:10px;" onclick="transfer()">SEND ASSETS</button>
                </div>
            </div>

        </div>

        <nav class="bottom-nav">
            <div class="nav-link active" onclick="nav('home')"><i class="fas fa-th-large"></i><span>HOME</span></div>
            <div class="nav-link" onclick="nav('market')"><i class="fas fa-chart-line"></i><span>MARKET</span></div>
            <div class="nav-link" onclick="nav('wallet')"><i class="fas fa-wallet"></i><span>WALLET</span></div>
        </nav>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9_ZIz7D59Z-fooXVcUOffzEdWCQR3X2o",
            authDomain: "lgbtcoineu.firebaseapp.com",
            databaseURL: "https://lgbtcoineu-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "lgbtcoineu",
            storageBucket: "lgbtcoineu.firebasestorage.app",
            messagingSenderId: "381272855019",
            appId: "1:381272855019:web:6f9abb97d4e863535f89ae"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const session = localStorage.getItem("lgbt_master_key");

        let marketPrice = 0.22;
        let userBalance = 0;

        // --- REALTIME PRICE & CHART CONTROLLER ---
        // В Firebase създайте: market/current и market/history
        onValue(ref(db, 'market'), (snap) => {
            const data = snap.val();
            if(data) {
                marketPrice = data.current || 0.22;
                document.getElementById('m-price').innerText = "€" + marketPrice.toFixed(4);
                updateFiatUI();
                if(data.history) drawChart(data.history);
                document.getElementById('m-status').innerText = data.trend || "STABLE";
            }
        });

        function updateFiatUI() {
            document.getElementById('u-euro').innerText = (userBalance * marketPrice).toFixed(2);
        }

        // --- AUTH ---
        window.handleAuth = async () => {
            const n = document.getElementById('a-name').value;
            const p = document.getElementById('a-phone').value;
            const s = document.getElementById('a-pass').value;
            if(!p || !s) return alert("Missing info");

            const uRef = ref(db, 'users/' + p);
            const snap = await get(uRef);

            if(!snap.exists()) {
                await set(uRef, { name: n, phone: p, pass: s, balance: 0, speed: 3.0, last: 0 });
            } else if(snap.val().pass !== s) return alert("Wrong password");

            localStorage.setItem("lgbt_master_key", p);
            location.reload();
        };

        // --- APP LOGIC ---
        if(session) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';

            onValue(ref(db, 'users/' + session), (snap) => {
                const d = snap.val();
                if(d) {
                    userBalance = d.balance || 0;
                    document.getElementById('u-name').innerText = d.name;
                    document.getElementById('u-bal').innerText = userBalance.toFixed(4);
                    document.getElementById('u-speed').innerText = d.speed.toFixed(1) + " GH/s";
                    updateFiatUI();
                    syncMiner(d.last);
                }
            });
        }

        window.startCycle = async () => {
            const r = ref(db, 'users/' + session);
            await update(r, { last: Date.now() });
            
            // Автоматично добавяне (симулация докато си в сайта)
            setInterval(async () => {
                const s = await get(r);
                const d = s.val();
                if(Date.now() - d.last < 86400000) {
                    update(r, { balance: d.balance + (d.speed / 14400) });
                }
            }, 5000);
        };

        function syncMiner(last) {
            const btn = document.getElementById('m-btn');
            const box = document.getElementById('m-box');
            const now = Date.now();
            if(last && (now - last < 86400000)) {
                btn.disabled = true; btn.innerText = "MINING IN PROGRESS...";
                box.classList.add('active');
            } else {
                btn.disabled = false; btn.innerText = "START CLOUD MINING";
                box.classList.remove('active');
            }
        }

        // --- CHART ENGINE ---
        let chartObj;
        function drawChart(points) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            const arr = points.split(',').map(Number);
            if(chartObj) chartObj.destroy();
            chartObj = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: arr.map(() => ''),
                    datasets: [{
                        data: arr,
                        borderColor: '#FFD700',
                        borderWidth: 4,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(255,215,0,0.03)',
                        pointRadius: 0
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
            });
        }

        // --- NAV ---
        window.nav = (p) => {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.getElementById('p-' + p).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };

        window.transfer = () => alert("Initiating Blockchain Transfer...");
    </script>
</body>
</html>
