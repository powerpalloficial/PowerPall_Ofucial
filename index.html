<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PowerPal Green Miner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: 'Inter', sans-serif; text-align: center; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        /* Зелен кант около логото */
        .logo { width: 90px; height: 90px; border-radius: 22px; margin-bottom: 15px; border: 2px solid #0ecb81; box-shadow: 0 0 20px rgba(14, 203, 129, 0.2); }
        
        /* Основната карта със зелен кант */
        .card { background: linear-gradient(145deg, #1e2329, #161a1e); padding: 30px 20px; border-radius: 28px; border: 1px solid #0ecb81; width: 85%; box-shadow: 0 12px 40px rgba(0,0,0,0.6); }
        .brand-name { color: #0ecb81; font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .balance { font-size: 52px; font-weight: 900; color: white; font-variant-numeric: tabular-nums; margin: 10px 0; }
        .details { display: flex; justify-content: space-around; margin-top: 15px; border-top: 1px solid #2b3139; padding-top: 15px; }
        .detail-item { font-size: 12px; color: #8b949e; }
        /* Зелен цвят за стойностите */
        .detail-value { color: #0ecb81; font-weight: bold; display: block; font-size: 14px; }

        /* Изцяло зелен пулсиращ бутон */
        .mine-btn { width: 190px; height: 190px; border-radius: 50%; border: 10px solid #2b3139; background: radial-gradient(circle, #0ecb81, #0a9d63); color: #0b0e11; font-size: 22px; font-weight: 900; cursor: pointer; transition: 0.3s; margin-top: 35px; box-shadow: 0 0 30px rgba(14, 203, 129, 0.2); animation: pulseGreen 2s infinite; }
        .mine-btn:active { transform: scale(0.93); box-shadow: 0 0 10px rgba(14, 203, 129, 0.1); }
        /* Сив цвят за изключения бутон */
        .mine-btn:disabled { background: #2b3139; color: #5e6673; border-color: #1e2329; box-shadow: none; cursor: default; animation: none; }

        /* Зелена анимация на пулсиране */
        @keyframes pulseGreen { 0% { box-shadow: 0 0 20px rgba(14, 203, 129, 0.2); } 50% { box-shadow: 0 0 35px rgba(14, 203, 129, 0.4); } 100% { box-shadow: 0 0 20px rgba(14, 203, 129, 0.2); } }

        .status-area { margin-top: 25px; font-size: 15px; color: #8b949e; }
        /* Зелен цвят за таймера */
        .timer { color: #0ecb81; font-weight: 800; font-family: monospace; font-size: 18px; }
    </style>
</head>
<body>

    <img src="image.png" alt="PowerPal" class="logo">

    <div class="card">
        <div class="brand-name">PowerPal Miner</div>
        <div class="balance" id="bal">0.000000</div>
        
        <div class="details">
            <div class="detail-item">Speed<span class="detail-value">10 GH/s</span></div>
            <div class="detail-item">Value<span class="detail-value" id="usd">$0.00</span></div>
        </div>
    </div>

    <button class="mine-btn" id="mBtn" onclick="startMining()">START<br>MINING</button>
    
    <div class="status-area" id="status">
        System: <span class="timer">READY TO MINE</span>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseFloat(localStorage.getItem('ppg_bal')) || 0;
        let lastActive = localStorage.getItem('ppg_start');
        const ratePerSec = 0.0000025; // Печалба на секунда за 10 GH/s

        function updateUI() {
            document.getElementById('bal').innerText = balance.toFixed(6);
            document.getElementById('usd').innerText = "$" + (balance * 0.45).toFixed(2);
        }

        function startMining() {
            lastActive = Date.now();
            localStorage.setItem('ppg_start', lastActive);
            runEngine();
        }

        function runEngine() {
            const btn = document.getElementById('mBtn');
            btn.disabled = true;

            const loop = setInterval(() => {
                let now = Date.now();
                let passed = (now - lastActive) / 1000;
                let remaining = 86400 - passed; // 24 часа

                if (remaining > 0) {
                    balance += ratePerSec;
                    localStorage.setItem('ppg_bal', balance);
                    
                    let h = Math.floor(remaining / 3600);
                    let m = Math.floor((remaining % 3600) / 60);
                    let s = Math.floor(remaining % 60);
                    
                    document.getElementById('status').innerHTML = 
                        `Session ends in: <span class="timer">${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}</span>`;
                    updateUI();
                } else {
                    clearInterval(loop);
                    btn.disabled = false;
                    document.getElementById('status').innerHTML = "System: <span class='timer'>READY</span>";
                }
            }, 1000);
        }

        // Offline Mining (Проверка при влизане)
        if (lastActive) {
            let elapsed = (Date.now() - lastActive) / 1000;
            if (elapsed < 86400) {
                balance += elapsed * ratePerSec;
                runEngine();
            } else {
                document.getElementById('status').innerHTML = "System: <span class='timer'>READY</span>";
            }
        }

        updateUI();
    </script>
</body>
</html>
