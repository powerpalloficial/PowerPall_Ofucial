<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LGBTcoin Pro | Dark Exchange</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --primary: #FFFFFF;
            --accent: #FFD700;
            --text-dim: #888888;
            --safe: #00ff88;
            --danger: #ff3333;
            --rainbow: linear-gradient(90deg, #ff0000, #ff8d00, #ffee00, #008121, #004cff, #760089);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--primary); overflow: hidden; height: 100vh; }

        /* --- AUTH SCREEN --- */
        #page-auth { 
            height: 100vh; position: fixed; width: 100%; z-index: 9999;
            display: flex; align-items: center; justify-content: center; padding: 25px;
            background: #000;
        }
        .auth-card { 
            background: var(--card); padding: 40px 30px; border-radius: 30px; 
            width: 100%; max-width: 400px; text-align: center; border: 1px solid #333;
        }
        .auth-card h1 { font-weight: 800; font-size: 32px; letter-spacing: -1px; background: var(--rainbow); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .input-box { 
            width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 12px; 
            border: 1px solid #333; outline: none; font-size: 16px; background: #1a1a1a; color: #fff;
        }
        .btn-gold { 
            width: 100%; padding: 18px; background: var(--accent); color: #000; 
            border: none; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase;
        }

        /* --- MAIN APP --- */
        #app-shell { display: none; height: 100vh; flex-direction: column; }
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 110px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* DASHBOARD ELEMENTS */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .balance-card { 
            background: var(--card); padding: 35px 20px; border-radius: 25px; 
            text-align: center; border: 1px solid #222; margin-bottom: 20px;
        }
        .balance-card small { color: var(--text-dim); text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        .balance-card h1 { font-size: 45px; font-weight: 800; margin: 5px 0; }
        .balance-card .money-val { color: var(--safe); font-weight: 600; font-size: 18px; }

        .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-item { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid #222; text-align: center; }
        .stat-item span { display: block; font-size: 10px; color: var(--text-dim); margin-bottom: 5px; }

        .mining-zone {
            background: #111; padding: 30px; border-radius: 25px; text-align: center; border: 1px dashed #444;
        }
        .btn-mine { 
            background: var(--primary); color: #000; width: 100%; padding: 20px; 
            border-radius: 15px; font-weight: 900; border: none; cursor: pointer;
        }
        .btn-mine.active { background: #333; color: #777; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* NAVIGATION */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; height: 85px; 
            background: #000; border-top: 1px solid #222; display: flex; 
        }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; cursor: pointer; }
        .nav-tab.active { color: var(--accent); }
        .nav-tab i { font-size: 20px; margin-bottom: 5px; }
        .nav-tab span { font-size: 10px; font-weight: 600; }

        /* SHOP & LISTS */
        .list-item { 
            background: var(--card); padding: 20px; border-radius: 20px; 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }

        /* CHART BOX */
        .chart-box { background: var(--card); padding: 15px; border-radius: 25px; border: 1px solid #222; margin-top: 15px; }

        /* TOAST */
        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #000; padding: 12px 25px; border-radius: 50px;
            font-weight: 700; z-index: 10000; transition: 0.4s;
        }
        #toast.show { top: 20px; }
    </style>
</head>
<body>

    <div id="toast">Notification</div>

    <section id="page-auth">
        <div class="auth-card">
            <h1>LGBTcoin PRO</h1>
            <p style="color:#555; margin-bottom:30px; font-size:14px;">Institutional Grade Mining</p>
            <input type="text" id="reg-name" class="input-box" placeholder="Your Name">
            <input type="tel" id="reg-phone" class="input-box" placeholder="Phone Number">
            <input type="password" id="reg-pass" class="input-box" placeholder="Password">
            <button class="btn-gold" onclick="auth()">Sign In / Up</button>
        </div>
    </section>

    <main id="app-shell">
        <div class="content">
            
            <div id="view-mining" class="page active">
                <div class="header">
                    <span style="font-weight:600;">Account: <b id="ui-name" style="color:var(--accent);">---</b></span>
                    <i class="fas fa-bell"></i>
                </div>
                
                <div class="balance-card">
                    <small>Total Balance</small>
                    <h1 id="ui-bal">0.0000</h1>
                    <div class="money-val">≈ €<span id="ui-money">0.00</span></div>
                </div>

                <div class="stat-row">
                    <div class="stat-item"><span>Hashrate</span><b id="ui-speed">3.0 GH/s</b></div>
                    <div class="stat-item"><span>Price</span><b style="color:var(--safe);">€<span id="ui-cur-price">0.00</span></b></div>
                </div>

                <div class="mining-zone">
                    <button id="mine-btn" class="btn-mine" onclick="startMining()">ACTIVATE MINER</button>
                    <p id="mine-timer" style="margin-top:15px; font-size:12px; color:var(--text-dim);"></p>
                </div>
            </div>

            <div id="view-market" class="page">
                <h2 style="margin-bottom:20px;">Market Trend</h2>
                <div class="chart-box">
                    <canvas id="liveChart"></canvas>
                </div>
                <div class="list-item" style="margin-top:20px;">
                    <span>Market Status</span>
                    <b style="color:var(--safe);">BULLISH</b>
                </div>
            </div>

            <div id="view-shop" class="page">
                <h2 style="margin-bottom:20px;">Cloud Power</h2>
                <div class="list-item">
                    <div><b>V1. Basic Node</b><p style="font-size:11px; color:#555;">+20 GH/s Power</p></div>
                    <button class="btn-gold" style="width:80px; padding:10px; font-size:12px;" onclick="pay('€1.99')">€1.99</button>
                </div>
                <div class="list-item">
                    <div><b>V2. GPU Rig</b><p style="font-size:11px; color:#555;">+100 GH/s Power</p></div>
                    <button class="btn-gold" style="width:80px; padding:10px; font-size:12px;" onclick="pay('€6.99')">€6.99</button>
                </div>
            </div>

            <div id="view-wallet" class="page">
                <h2 style="margin-bottom:20px;">Safe Send</h2>
                <div class="auth-card" style="width:100%; border:none; padding:20px;">
                    <input type="text" id="tx-phone" class="input-box" placeholder="Receiver Phone">
                    <input type="number" id="tx-amt" class="input-box" placeholder="Amount LGBT">
                    <button class="btn-gold" onclick="send()">Transfer Now</button>
                </div>
            </div>

        </div>

        <nav class="nav-bar">
            <div class="nav-tab active" onclick="tab('mining')"><i class="fas fa-layer-group"></i><span>Home</span></div>
            <div class="nav-tab" onclick="tab('market')"><i class="fas fa-chart-line"></i><span>Market</span></div>
            <div class="nav-tab" onclick="tab('shop')"><i class="fas fa-bolt"></i><span>Buy</span></div>
            <div class="nav-tab" onclick="tab('wallet')"><i class="fas fa-wallet"></i><span>Wallet</span></div>
        </nav>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIG (Your actual config)
        const firebaseConfig = {
            apiKey: "AIzaSyD9_ZIz7D59Z-fooXVcUOffzEdWCQR3X2o",
            authDomain: "lgbtcoineu.firebaseapp.com",
            databaseURL: "https://lgbtcoineu-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "lgbtcoineu",
            storageBucket: "lgbtcoineu.firebasestorage.app",
            messagingSenderId: "381272855019",
            appId: "1:381272855019:web:6f9abb97d4e863535f89ae"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentPrice = 0.22; // Default
        let myBalance = 0;
        const user = localStorage.getItem("user_pro");

        // --- GLOBAL SETTINGS (PRICE & CHART) ---
        onValue(ref(db, 'settings'), (snap) => {
            const s = snap.val();
            if(s) {
                currentPrice = s.price || 0.22;
                document.getElementById('ui-cur-price').innerText = currentPrice.toFixed(4);
                updateValueUI();
                if(s.chart) updateChart(s.chart);
            }
        });

        function updateValueUI() {
            document.getElementById('ui-money').innerText = (myBalance * currentPrice).toFixed(2);
        }

        // --- AUTH ---
        window.auth = async () => {
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;
            const pass = document.getElementById('reg-pass').value;
            if(!phone || !pass) return alert("Fields empty!");

            const uRef = ref(db, 'users/' + phone);
            const snap = await get(uRef);

            if(!snap.exists()) {
                await set(uRef, { name, phone, pass, balance: 0, speed: 3.0, lastMine: 0 });
            } else if(snap.val().pass !== pass) return alert("Wrong pass!");

            localStorage.setItem("user_pro", phone);
            location.reload();
        };

        // --- APP LOGIC ---
        if(user) {
            document.getElementById('page-auth').style.display = 'none';
            document.getElementById('app-shell').style.display = 'flex';

            onValue(ref(db, 'users/' + user), (s) => {
                const d = s.val();
                myBalance = d.balance || 0;
                document.getElementById('ui-name').innerText = d.name;
                document.getElementById('ui-bal').innerText = myBalance.toFixed(4);
                document.getElementById('ui-speed').innerText = (d.speed || 3.0).toFixed(1) + " GH/s";
                updateValueUI();
                checkMining(d.lastMine);
            });
        }

        window.startMining = async () => {
            const uRef = ref(db, 'users/' + user);
            const snap = await get(uRef);
            const d = snap.val();
            await update(uRef, { lastMine: Date.now() });
            
            // Realtime update while active
            setInterval(async () => {
                const live = await get(uRef);
                const ld = live.val();
                if(Date.now() - ld.lastMine < 86400000) {
                    update(uRef, { balance: ld.balance + (ld.speed / 15000) });
                }
            }, 5000);
        };

        function checkMining(last) {
            const btn = document.getElementById('mine-btn');
            const timer = document.getElementById('mine-timer');
            const now = Date.now();
            if(last && (now - last < 86400000)) {
                btn.disabled = true; btn.classList.add('active'); btn.innerText = "MINING ENGINE ON";
                timer.innerText = "System will reset in 24h";
            } else {
                btn.disabled = false; btn.classList.remove('active'); btn.innerText = "ACTIVATE MINER";
                timer.innerText = "Miner Offline";
            }
        }

        // --- CHART ENGINE ---
        let myChart;
        function updateChart(dataStr) {
            const dataArray = dataStr.split(',').map(Number);
            const ctx = document.getElementById('liveChart').getContext('2d');
            
            if(myChart) myChart.destroy();
            
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dataArray.map((_, i) => i),
                    datasets: [{
                        data: dataArray,
                        borderColor: '#FFD700',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(255, 215, 0, 0.05)',
                        pointRadius: 0
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { display: false } } }
            });
        }

        // --- HELPERS ---
        window.tab = (t) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('view-' + t).classList.add('active');
            document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };
        window.pay = (p) => alert("Send TON to UQCuI... \nAmount: " + p);
        window.send = () => alert("Processing secure transfer...");
    </script>
</body>
</html>
