<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PowerPal Official Miner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: 'Inter', sans-serif; text-align: center; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .logo { width: 75px; height: 75px; border-radius: 20px; margin-top: 5px; border: 2px solid #f2e032; box-shadow: 0 0 20px rgba(242, 224, 50, 0.4); }
        
        .brand-tag { color: #f2e032; font-size: 10px; font-weight: 900; letter-spacing: 2px; margin-top: 10px; text-transform: uppercase; }

        .card { background: linear-gradient(145deg, #1e2329, #161a1e); padding: 20px; border-radius: 24px; border: 1px solid #f2e032; width: 90%; margin-top: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .balance-label { color: #8b949e; font-size: 11px; text-transform: uppercase; }
        .balance { font-size: 44px; font-weight: 900; color: white; margin: 5px 0; font-variant-numeric: tabular-nums; }
        .euro-val { color: #0ecb81; font-weight: bold; font-size: 22px; }

        /* МАГАЗИН POWERPAL */
        .shop-container { width: 95%; margin-top: 25px; text-align: left; }
        .shop-header { color: #f2e032; font-size: 13px; font-weight: 800; margin-bottom: 12px; }
        
        .upgrade-item { background: rgba(255, 255, 255, 0.03); border-radius: 16px; padding: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2b3139; }
        
        .upg-name { font-size: 14px; font-weight: bold; color: #fff; display: block; }
        .upg-speed { font-size: 11px; color: #0ecb81; font-weight: 600; }
        
        .buy-btn { background: linear-gradient(to bottom, #f2e032, #d5c31c); color: #0b0e11; border: none; padding: 10px 18px; border-radius: 12px; font-weight: 900; font-size: 13px; cursor: pointer; }

        .mine-btn { width: 150px; height: 150px; border-radius: 50%; border: 8px solid #2b3139; background: #f2e032; color: #0b0e11; font-size: 20px; font-weight: 900; margin-top: 25px; cursor: pointer; transition: 0.2s; outline: none; }
        .mine-btn:active { transform: scale(0.9); }
        .mine-btn:disabled { background: #2b3139; color: #5e6673; border-color: #1c2127; }

        .status { margin-top: 20px; font-size: 12px; color: #8b949e; letter-spacing: 1px; }
        .timer-val { color: #f2e032; font-weight: bold; }
    </style>
</head>
<body>

    <img src="image.png" alt="PowerPal" class="logo">
    <div class="brand-tag">POWERPAL ECOLOGY</div>

    <div class="card">
        <div class="balance-label">Mining Assets</div>
        <div class="balance" id="bal">0.000000</div>
        <div class="euro-val" id="eur">€0.00</div>
    </div>

    <div class="shop-container">
        <div class="shop-header">🚀 POWERPAL PREMIUM STORE</div>
        
        <div class="upgrade-item">
            <div>
                <span class="upg-name">Power Starter</span>
                <span class="upg-speed">+50 GH/s BOOST</span>
            </div>
            <button class="buy-btn" onclick="handlePay(50, 'STARTER')">50 ⭐</button>
        </div>

        <div class="upgrade-item">
            <div>
                <span class="upg-name">Power Pro Miner</span>
                <span class="upg-speed">+200 GH/s BOOST</span>
            </div>
            <button class="buy-btn" onclick="handlePay(150, 'PRO')">150 ⭐</button>
        </div>

        <div class="upgrade-item">
            <div>
                <span class="upg-name">Power Elite Status</span>
                <span class="upg-speed">+1000 GH/s BOOST</span>
            </div>
            <button class="buy-btn" onclick="handlePay(500, 'ELITE')">500 ⭐</button>
        </div>
    </div>

    <button class="mine-btn" id="mBtn" onclick="startMining()">START</button>
    <div class="status" id="status">SESSION: <span class="timer-val">READY</span></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseFloat(localStorage.getItem('pp_v1_bal')) || 0;
        let lastStart = localStorage.getItem('pp_v1_start');
        const rate = 0.000025; // Скорост на копаене

        function updateUI() {
            document.getElementById('bal').innerText = balance.toFixed(6);
            document.getElementById('eur').innerText = "€" + (balance * 10).toFixed(2);
        }

        function handlePay(amt, name) {
            tg.HapticFeedback.notificationOccurred('success');
            alert("PowerPal Checkout: " + name + " (" + amt + " Stars)");
        }

        function startMining() {
            lastStart = Date.now();
            localStorage.setItem('pp_v1_start', lastStart);
            run();
        }

        function run() {
            const btn = document.getElementById('mBtn');
            btn.disabled = true;
            const loop = setInterval(() => {
                let now = Date.now();
                let diff = (now - lastStart) / 1000;
                let rem = 86400 - diff;
                if (rem > 0) {
                    balance += rate;
                    localStorage.setItem('pp_v1_bal', balance);
                    let h = Math.floor(rem / 3600);
                    let m = Math.floor((rem % 3600) / 60);
                    let s = Math.floor(rem % 60);
                    document.getElementById('status').innerHTML = `SESSION: <span class="timer-val">${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}</span>`;
                    updateUI();
                } else { 
                    clearInterval(loop);
                    btn.disabled = false; 
                    document.getElementById('status').innerHTML = `SESSION: <span class="timer-val">READY</span>`;
                }
            }, 1000);
        }

        if (lastStart && (Date.now() - lastStart)/1000 < 86400) {
            balance += ((Date.now() - lastStart)/1000) * rate;
            run();
        }
        updateUI();
    </script>
</body>
</html>
